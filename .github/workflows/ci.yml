name: Oathbound CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify GWT Output
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Build with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            gradle:7.6-jdk11 \
            ./gradlew :html:dist --no-daemon

      - name: Confirm build output exists
        run: |
          echo "Build successful! Output files:"
          ls html/build/dist/
