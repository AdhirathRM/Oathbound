name: Oathbound CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify GWT Output
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Build Oathbound (GWT)
        run: ./gradlew :html:dist --no-daemon

      - name: Confirm build output exists
        run: |
          echo "Build successful! Output files:"
          ls html/build/dist/
